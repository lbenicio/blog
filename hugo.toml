title = "Leonardo Benicio"
theme = "github.com/lbenicio/aboutme-v2-theme"
baseURL = "/"
locale = "en-us"
resourceDir = "resources"

[pagination]
pagerSize = 24
path = "page"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
style = "github-dark"
guessSyntax = true

[taxonomies]
tag = "tags"
category = "categories"

[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS", "JSON"]
taxonomy = ["HTML", "RSS"]
term = ["HTML", "RSS"]

[sitemap]
changefreq = "daily"
priority = 0.5
filename = "sitemap.xml"

[permalinks]
post = "/post/:year/:month/:day/:slug/"

[params]
author = "Leonardo Benicio"
description = "Posts, notes, and articles."
showReadingTime = true

# Social handlers (global defaults; overridable per-page via front matter)
githubHandler = "lbenicio"
linkedinHandler = "leonardo-benicio"
twitterHandler = "lbenicio_"

# Site (overridden by CI via /tmp/hugo-dynamic.toml)
siteUrl = "http://localhost:1313/"
appMode = "BLOG_ONLY"
aboutOrigin = "http://localhost:1313/"
blogOrigin = "http://localhost:1313/blog/"

# Umami analytics
umamiBlogId = "c3cde340-7e81-480f-a38a-dc20a57081fa"
umamiScriptUrl = "https://analytics.4686189.xyz/script.js"

# Fork me ribbon
enableForkMe = true
forkMeRepoUrl = "https://github.com/lbenicio/blog"

# Legal links
privacyUrl = "https://legal.lbenicio.dev/docs/privacy-policy"
termsUrl = "https://legal.lbenicio.dev/docs/terms-of-service"
