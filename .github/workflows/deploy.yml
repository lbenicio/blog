name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deps:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  submodules: recursive

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: "0.163.1"
                  extended: true

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"

            - name: Cache Go modules
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
                  restore-keys: go-${{ runner.os }}-

            - name: Cache Hugo modules
              uses: actions/cache@v5
              with:
                  path: /tmp/hugo_cache
                  key: hugo-${{ runner.os }}-${{ hashFiles('go.sum') }}
                  restore-keys: hugo-${{ runner.os }}-

            - name: Download Go dependencies
              run: go mod download

            - name: Download Hugo modules
              run: hugo mod get

    build:
        needs: deps
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  submodules: recursive

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: "0.163.1"
                  extended: true

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Restore Go cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
                  restore-keys: go-${{ runner.os }}-

            - name: Restore Hugo cache
              uses: actions/cache@v5
              with:
                  path: /tmp/hugo_cache
                  key: hugo-${{ runner.os }}-${{ hashFiles('go.sum') }}
                  restore-keys: hugo-${{ runner.os }}-

            - name: Generate OG images
              run: go run github.com/lbenicio/aboutme-v2-theme/cmd/ogimage@latest --glob="content/post/*.md" --out="static/static/og"
              continue-on-error: true

            - name: Generate calendar pages
              run: |
                  # Build list of years that have posts
                  YEARS=$(ls content/post/ | grep -oE '^[0-9]{4}' | sort -u)

                  for year in $YEARS; do
                    for month in 01 02 03 04 05 06 07 08 09 10 11 12; do
                      # ── Month pages ──
                      dir="content/calendar/${year}/${month}"
                      mkdir -p "$dir"
                      cat > "${dir}/_index.md" << EOF
                  ---
                  title: "${year}-${month}"
                  layout: calendar
                  type: calendar
                  ---
                  EOF

                      # ── Day pages (one per day) ──
                      dim=31
                      case "$month" in
                        04|06|09|11) dim=30 ;;
                        02)
                          dim=28
                            if (( (year % 4 == 0 && year % 100 != 0) || year % 400 == 0 )); then dim=29; fi
                          ;;
                      esac
                      for day in $(seq -w 1 $dim); do
                        ddir="content/calendar/day/${year}/${month}/${day}"
                        mkdir -p "$ddir"
                        cat > "${ddir}/_index.md" << EOF
                  ---
                  title: "${year}-${month}-${day}"
                  layout: calendar
                  type: calendar
                  ---
                  EOF
                      done
                    done

                    # ── Week pages (every Monday of the year) ──
                    # Use GNU date to walk through Mondays
                    d="$year-01-01"
                    # Find the first Monday of the year
                    dow=$(date -d "$d" +%u 2>/dev/null || date -j -f "%Y-%m-%d" "$d" +%u 2>/dev/null)
                    if [ "$dow" != "1" ]; then
                      days_ahead=$(( (8 - dow) % 7 ))
                      d=$(date -d "$d + $days_ahead days" +%Y-%m-%d 2>/dev/null || date -j -v+${days_ahead}d -f "%Y-%m-%d" "$d" +%Y-%m-%d 2>/dev/null)
                    fi
                    while [ "${d%%-*}" = "$year" ]; do
                      wy=$(echo "$d" | cut -d- -f1)
                      wm=$(echo "$d" | cut -d- -f2)
                      wd=$(echo "$d" | cut -d- -f3)
                      wdir="content/calendar/week/${wy}/${wm}/${wd}"
                      mkdir -p "$wdir"
                      cat > "${wdir}/_index.md" << EOF
                  ---
                  title: "Week ${wy}-${wm}-${wd}"
                  layout: calendar
                  type: calendar
                  ---
                  EOF
                      d=$(date -d "$d + 7 days" +%Y-%m-%d 2>/dev/null || date -j -v+7d -f "%Y-%m-%d" "$d" +%Y-%m-%d 2>/dev/null)
                    done
                  done

                  echo "Calendar pages generated ($(find content/calendar -name '_index.md' | wc -l) files)"

            - name: Configure Pages
              uses: actions/configure-pages@v5
              id: pages

            - name: Build with Hugo
              env:
                  BASE_URL: ${{ steps.pages.outputs.base_url }}
              run: |
                  # Ask GitHub for the home site's actual Pages URL
                  HOME_URL=$(curl -sS -H "Authorization: Bearer ${{ github.token }}" \
                    "https://api.github.com/repos/${{ github.repository_owner }}/${{ github.repository_owner }}.github.io/pages" \
                    | jq -r '.html_url // "${{ steps.pages.outputs.origin }}"')
                  HOME_URL="${HOME_URL%/}/"

                  if [ "${{ github.event.repository.name }}" = "blog" ]; then
                    BLOG_URL="${BASE_URL}"
                  else
                    BLOG_URL="${HOME_URL}blog/"
                  fi

                  cat > /tmp/hugo-dynamic.toml << EOF
                  baseURL = "${BASE_URL}"
                  [params]
                  siteUrl = "${HOME_URL}"
                  aboutOrigin = "${HOME_URL}"
                  blogOrigin = "${BLOG_URL}"
                  EOF

                  echo "::group::Hugo build"
                  echo "  baseURL     = ${BASE_URL}"
                  echo "  siteUrl     = ${HOME_URL}"
                  echo "  aboutOrigin = ${HOME_URL}"
                  echo "  blogOrigin  = ${BLOG_URL}"
                  hugo --minify --environment production --cleanDestinationDir --config hugo.toml,/tmp/hugo-dynamic.toml --logLevel info
                  echo "::endgroup::"
                  echo "Build complete — $(find public -type f | wc -l) files generated"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: hugo-public
                  path: ./public
                  retention-days: 1

    obfuscate:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: hugo-public
                  path: ./public

            - name: Obfuscate
              run: |
                  echo "::group::Obfuscation"
                  echo "Files to process: $(find public -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' \) | wc -l)"
                  GOPROXY=direct go run github.com/lbenicio/aboutme-v2-theme/cmd/obfuscate@main -verbose ./public
                  echo "::endgroup::"

            - name: Upload pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: ./public

    deploy:
        needs: obfuscate
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    report:
        needs: [deps, build, obfuscate, deploy]
        if: always()
        runs-on: ubuntu-latest
        permissions:
            actions: read
        steps:
            - name: Generate summary
              run: |
                  {
                    echo "## 🚀 Deploy Summary"
                    echo ""
                    echo "| Field | Value |"
                    echo "|-------|-------|"
                    echo "| Workflow | Build and Deploy to GitHub Pages |"
                    echo "| Trigger   | ${{ github.event_name }} |"
                    echo "| Branch    | ${{ github.ref_name }} |"
                    echo "| Commit    | [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |"
                    echo "| Actor     | ${{ github.actor }} |"
                    echo "| Ran at    | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |"
                    echo ""
                    echo "### Jobs"
                    echo ""
                    echo "| Job        | Result   |"
                    echo "|------------|----------|"
                    echo "| deps       | ${{ needs.deps.result }} |"
                    echo "| build      | ${{ needs.build.result }} |"
                    echo "| obfuscate  | ${{ needs.obfuscate.result }} |"
                    echo "| deploy     | ${{ needs.deploy.result }} |"
                    echo ""
                    if [ "${{ needs.deploy.result }}" = "success" ]; then
                      echo "✅ Deployed successfully."
                    elif [ "${{ needs.build.result }}" = "failure" ]; then
                      echo "❌ Build failed — check logs above."
                    elif [ "${{ needs.obfuscate.result }}" = "failure" ]; then
                      echo "❌ Obfuscation failed — check logs above."
                    else
                      echo "⚠️  Pipeline incomplete."
                    fi
                  } >> $GITHUB_STEP_SUMMARY
